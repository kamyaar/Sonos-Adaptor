<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Phone (left) -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="70" height="120" rx="10" fill="#0f3460" stroke="#4CAF50" stroke-width="1.5"/>
    <rect x="5" y="12" width="60" height="80" rx="3" fill="#1a1a2e"/>
    <circle cx="35" cy="108" r="5" fill="#4CAF50" fill-opacity="0.6"/>
    <!-- USB-C port -->
    <rect x="22" y="118" width="26" height="5" rx="2.5" fill="#4CAF50" fill-opacity="0.8"/>
    <!-- Screen content - waveform mini -->
    <polyline points="8,52 14,40 20,58 26,35 32,52 38,45 44,60 50,38 56,52 62,48" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-opacity="0.7"/>
  </g>

  <!-- Audio wave lines (center, animated feel) -->
  <g transform="translate(220, 150)">
    <!-- Wave bars -->
    <rect x="0"   y="-10" width="8" height="20" rx="4" fill="url(#wave)" opacity="0.5"/>
    <rect x="14"  y="-30" width="8" height="60" rx="4" fill="url(#wave)" opacity="0.7"/>
    <rect x="28"  y="-45" width="8" height="90" rx="4" fill="url(#wave)" opacity="0.9"/>
    <rect x="42"  y="-55" width="8" height="110" rx="4" fill="url(#wave)"/>
    <rect x="56"  y="-40" width="8" height="80" rx="4" fill="url(#wave)" opacity="0.9"/>
    <rect x="70"  y="-60" width="8" height="120" rx="4" fill="url(#wave)"/>
    <rect x="84"  y="-35" width="8" height="70" rx="4" fill="url(#wave)" opacity="0.8"/>
    <rect x="98"  y="-50" width="8" height="100" rx="4" fill="url(#wave)"/>
    <rect x="112" y="-25" width="8" height="50" rx="4" fill="url(#wave)" opacity="0.7"/>
    <rect x="126" y="-15" width="8" height="30" rx="4" fill="url(#wave)" opacity="0.5"/>
    <!-- Arrow -->
    <polygon points="155,0 140,-10 140,10" fill="#4CAF50" opacity="0.9"/>
  </g>

  <!-- Sonos Speaker (right) -->
  <g transform="translate(660, 55)">
    <!-- Speaker body -->
    <rect x="0" y="0" width="100" height="155" rx="14" fill="#0f3460" stroke="#00bcd4" stroke-width="1.5"/>
    <!-- Speaker grille dots -->
    <g fill="#ffffff" fill-opacity="0.12">
      <circle cx="20" cy="30" r="3"/><circle cx="35" cy="30" r="3"/><circle cx="50" cy="30" r="3"/><circle cx="65" cy="30" r="3"/><circle cx="80" cy="30" r="3"/>
      <circle cx="20" cy="45" r="3"/><circle cx="35" cy="45" r="3"/><circle cx="50" cy="45" r="3"/><circle cx="65" cy="45" r="3"/><circle cx="80" cy="45" r="3"/>
      <circle cx="20" cy="60" r="3"/><circle cx="35" cy="60" r="3"/><circle cx="50" cy="60" r="3"/><circle cx="65" cy="60" r="3"/><circle cx="80" cy="60" r="3"/>
      <circle cx="20" cy="75" r="3"/><circle cx="35" cy="75" r="3"/><circle cx="50" cy="75" r="3"/><circle cx="65" cy="75" r="3"/><circle cx="80" cy="75" r="3"/>
      <circle cx="20" cy="90" r="3"/><circle cx="35" cy="90" r="3"/><circle cx="50" cy="90" r="3"/><circle cx="65" cy="90" r="3"/><circle cx="80" cy="90" r="3"/>
      <circle cx="20" cy="105" r="3"/><circle cx="35" cy="105" r="3"/><circle cx="50" cy="105" r="3"/><circle cx="65" cy="105" r="3"/><circle cx="80" cy="105" r="3"/>
    </g>
    <!-- Status LED -->
    <circle cx="50" cy="135" r="6" fill="#4CAF50" opacity="0.9"/>
    <!-- Sonos logo-style text -->
    <text x="50" y="152" font-family="sans-serif" font-size="9" fill="#00bcd4" fill-opacity="0.7" text-anchor="middle">SONOS</text>
  </g>

  <!-- Wi-Fi arc between phone and speaker -->
  <g stroke="#4CAF50" stroke-opacity="0.25" fill="none" stroke-width="1.5">
    <path d="M 170 130 Q 450 20 650 130"/>
    <path d="M 170 140 Q 450 50 650 140"/>
    <path d="M 170 150 Q 450 80 650 150"/>
  </g>

  <!-- Title -->
  <text x="450" y="210" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Sonos Adaptor</text>

  <!-- Subtitle -->
  <text x="450" y="245" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">USB-C Audio → Wi-Fi Streaming</text>

  <!-- Bottom accent line -->
  <rect x="340" y="262" width="220" height="2" rx="1" fill="url(#wave)" opacity="0.6"/>
</svg>
